services:
  - type: web
    name: sll-backend
    env: node
    buildCommand: npm install && npm run build
    startCommand: npm run start:prod
    envVars:
      - key: NODE_ENV
        value: production
      - key: API_PREFIX
        value: /api/v1
      - key: DATABASE_URL
        fromDatabase:
          name: sll-db
          property: connectionString
      - key: REDIS_URL
        fromService:
          type: redis
          name: sll-redis
          property: connectionString
      - key: JWT_SECRET
        generateValue: true
      - key: JWT_REFRESH_SECRET
        generateValue: true
      - key: MONGODB_URI
        sync: false # Set this manually in the Render dashboard

databases:
  - name: sll-db
    databaseName: sll_database
    user: sll_user

distribCache:
  - name: sll-redis
    plan: free
